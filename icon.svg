<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF9F0A;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF3B30;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
            <feOffset dx="0" dy="10" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <rect width="512" height="512" rx="100" fill="url(#grad1)" />
    <g filter="url(#shadow)">
        <rect x="120" y="120" width="272" height="272" rx="40" fill="white" fill-opacity="0.2" />
        <!-- Minus Sign -->
        <rect x="180" y="240" width="60" height="15" rx="5" fill="white" />
        <!-- Plus Sign -->
        <rect x="270" y="240" width="60" height="15" rx="5" fill="white" />
        <rect x="292.5" y="217.5" width="15" height="60" rx="5" fill="white" />
        <!-- Equals Sign -->
        <rect x="180" y="300" width="150" height="15" rx="5" fill="white" />
        <rect x="180" y="330" width="150" height="15" rx="5" fill="white" />
        <!-- Divide Sign -->
        <circle cx="210" cy="170" r="10" fill="white" />
        <rect x="180" y="190" width="60" height="10" rx="5" fill="white" />
        <circle cx="210" cy="220" r="10" fill="white" />
        <!-- Multiply Sign (x) -->
        <rect x="270" y="170" width="60" height="12" rx="5" fill="white" transform="rotate(45 300 176)" />
        <rect x="270" y="170" width="60" height="12" rx="5" fill="white" transform="rotate(-45 300 176)" />
    </g>
</svg>
